name: Release 3X-UI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "**.sh"
      - "frontend/**"
      - "q-ui.service.debian"
      - "q-ui.service.arch"
      - "q-ui.service.rhel"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "**.sh"
      - "frontend/**"
      - "q-ui.service.debian"
      - "q-ui.service.arch"
      - "q-ui.service.rhel"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        platform:
          - amd64
          - arm64
          - armv7
          - armv6
          - 386
          - armv5
          - s390x
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      # Frontend dist must be built BEFORE go build — Go's //go:embed
      # all:dist directive in internal/web/web.go requires internal/web/dist/ to exist
      # at compile time. internal/web/dist/ is .gitignored, so on a fresh CI
      # checkout it doesn't exist until vite emits it.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle
        run: |
          npm ci
          npm run build
        working-directory: frontend

      # Stamp the embedded version from the tag so the released binary always
      # reports its own tag (e.g. v1.0.6 -> "1.0.6"). This guarantees each new
      # tag is strictly newer than the previous release, so the panel's
      # auto-update detects every release without manual internal/config/version edits.
      - name: Stamp release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: printf '%s\n' "${GITHUB_REF_NAME#v}" > internal/config/version

      - name: Build 3X-UI
        run: |
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=${{ matrix.platform }}
          # Use Bootlin prebuilt cross-toolchains (musl 1.2.5 in stable series)
          case "${{ matrix.platform }}" in
            amd64) BOOTLIN_ARCH="x86-64" ;;
            arm64) BOOTLIN_ARCH="aarch64" ;;
            armv7) BOOTLIN_ARCH="armv7-eabihf"; export GOARCH=arm GOARM=7 ;;
            armv6) BOOTLIN_ARCH="armv6-eabihf"; export GOARCH=arm GOARM=6 ;;
            armv5) BOOTLIN_ARCH="armv5-eabi"; export GOARCH=arm GOARM=5 ;;
            386) BOOTLIN_ARCH="x86-i686" ;;
            s390x) BOOTLIN_ARCH="s390x-z13" ;;
          esac
          echo "Resolving Bootlin musl toolchain for arch=$BOOTLIN_ARCH (platform=${{ matrix.platform }})"
          TARBALL_BASE="https://toolchains.bootlin.com/downloads/releases/toolchains/$BOOTLIN_ARCH/tarballs/"
          TARBALL_URL=$(curl -fsSL "$TARBALL_BASE" | grep -oE "${BOOTLIN_ARCH}--musl--stable-[^\"]+\\.tar\\.xz" | sort -r | head -n1)
          [ -z "$TARBALL_URL" ] && { echo "Failed to locate Bootlin musl toolchain for arch=$BOOTLIN_ARCH" >&2; exit 1; }
          echo "Downloading: $TARBALL_URL"
          cd /tmp
          curl -fL -sS -o "$(basename "$TARBALL_URL")" "$TARBALL_BASE/$TARBALL_URL"
          tar -xf "$(basename "$TARBALL_URL")"
          TOOLCHAIN_DIR=$(find . -maxdepth 1 -type d -name "${BOOTLIN_ARCH}--musl--stable-*" | head -n1)
          export PATH="$(realpath "$TOOLCHAIN_DIR")/bin:$PATH"
          export CC=$(realpath "$(find "$TOOLCHAIN_DIR/bin" -name '*-gcc.br_real' -type f -executable | head -n1)")
          [ -z "$CC" ] && { echo "No gcc.br_real found in $TOOLCHAIN_DIR/bin" >&2; exit 1; }
          cd -
          go build -ldflags "-w -s -linkmode external -extldflags '-static'" -o xui-release -v main.go
          file xui-release
          ldd xui-release || echo "Static binary confirmed"

          mkdir q-ui
          cp xui-release q-ui/
          cp q-ui.service.debian q-ui/
          cp q-ui.service.arch q-ui/
          cp q-ui.service.rhel q-ui/
          cp q-ui.sh q-ui/
          mv q-ui/xui-release q-ui/q-ui
          mkdir q-ui/bin
          cd q-ui/bin

          # Download dependencies
          Xray_URL="https://github.com/XTLS/Xray-core/releases/download/v26.6.1/"
          if [ "${{ matrix.platform }}" == "amd64" ]; then
            wget -q ${Xray_URL}Xray-linux-64.zip
            unzip Xray-linux-64.zip
            rm -f Xray-linux-64.zip
          elif [ "${{ matrix.platform }}" == "arm64" ]; then
            wget -q ${Xray_URL}Xray-linux-arm64-v8a.zip
            unzip Xray-linux-arm64-v8a.zip
            rm -f Xray-linux-arm64-v8a.zip
          elif [ "${{ matrix.platform }}" == "armv7" ]; then
            wget -q ${Xray_URL}Xray-linux-arm32-v7a.zip
            unzip Xray-linux-arm32-v7a.zip
            rm -f Xray-linux-arm32-v7a.zip
          elif [ "${{ matrix.platform }}" == "armv6" ]; then
            wget -q ${Xray_URL}Xray-linux-arm32-v6.zip
            unzip Xray-linux-arm32-v6.zip
            rm -f Xray-linux-arm32-v6.zip
          elif [ "${{ matrix.platform }}" == "386" ]; then
            wget -q ${Xray_URL}Xray-linux-32.zip
            unzip Xray-linux-32.zip
            rm -f Xray-linux-32.zip
          elif [ "${{ matrix.platform }}" == "armv5" ]; then
            wget -q ${Xray_URL}Xray-linux-arm32-v5.zip
            unzip Xray-linux-arm32-v5.zip
            rm -f Xray-linux-arm32-v5.zip
          elif [ "${{ matrix.platform }}" == "s390x" ]; then
            wget -q ${Xray_URL}Xray-linux-s390x.zip
            unzip Xray-linux-s390x.zip
            rm -f Xray-linux-s390x.zip
          fi
          rm -f geoip.dat geosite.dat
          # Retry on transient 404s: the upstream rules repos can briefly 404
          # while their `latest` release republishes.
          WGET="wget -q --tries=5 --waitretry=10 --retry-on-http-error=404,429,500,502,503"
          $WGET https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat
          $WGET https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat
          $WGET -O geoip_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geoip.dat
          $WGET -O geosite_IR.dat https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geosite.dat
          $WGET -O geoip_RU.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geoip.dat
          $WGET -O geosite_RU.dat https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geosite.dat
          mv xray xray-linux-${{ matrix.platform }}
          # mtg (MTProto sidecar) - only for arches mtg publishes
          MTG_VER="2.2.8"
          case "${{ matrix.platform }}" in
            amd64|arm64|armv7|armv6|386)
              wget -q "https://github.com/9seconds/mtg/releases/download/v${MTG_VER}/mtg-${MTG_VER}-linux-${{ matrix.platform }}.tar.gz"
              tar -xzf "mtg-${MTG_VER}-linux-${{ matrix.platform }}.tar.gz"
              mv "mtg-${MTG_VER}-linux-${{ matrix.platform }}/mtg" "mtg-linux-${{ matrix.platform }}" 2>/dev/null || mv mtg "mtg-linux-${{ matrix.platform }}"
              rm -rf "mtg-${MTG_VER}-linux-${{ matrix.platform }}" "mtg-${MTG_VER}-linux-${{ matrix.platform }}.tar.gz"
              ;;
          esac
          cd ../..

      - name: Package
        run: tar -zcvf q-ui-linux-${{ matrix.platform }}.tar.gz q-ui

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: q-ui-linux-${{ matrix.platform }}
          path: ./q-ui-linux-${{ matrix.platform }}.tar.gz

      - name: Upload files to GH release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: q-ui-linux-${{ matrix.platform }}.tar.gz
          asset_name: q-ui-linux-${{ matrix.platform }}.tar.gz
          overwrite: true
          prerelease: false

  # =================================
  #  Windows Build
  # =================================
  build-windows:
    name: Build for Windows
    permissions:
      contents: write
    strategy:
      matrix:
        platform:
          - amd64
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      # Frontend dist must be built BEFORE go build — see comment on the
      # Linux job above. This step is identical except npm runs on the
      # Windows runner here.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle
        shell: pwsh
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-pkg-config

      # Stamp the embedded version from the tag (see the Linux job for why).
      - name: Stamp release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: ($env:GITHUB_REF_NAME -replace '^v','') | Set-Content -NoNewline -Encoding ascii internal/config/version

      - name: Build 3X-UI for Windows (CGO)
        shell: msys2 {0}
        run: |
          export PATH="/c/hostedtoolcache/windows/go/$(ls /c/hostedtoolcache/windows/go | sort -V | tail -n1)/x64/bin:$PATH"

          export CGO_ENABLED=1
          export GOOS=windows
          export GOARCH=amd64
          export CC=x86_64-w64-mingw32-gcc

          which go
          go version
          gcc --version

          go build -ldflags "-w -s" -o xui-release.exe -v main.go

      - name: Copy and download resources
        shell: pwsh
        run: |
          mkdir q-ui
          Copy-Item xui-release.exe q-ui\q-ui.exe
          mkdir q-ui\bin
          cd q-ui\bin

          # Resilient downloader: the GitHub release CDN can briefly 404 while an
          # upstream rules repo (e.g. russia-v2ray-rules-dat) republishes its
          # `latest` release, so retry on ANY failure including 404.
          function Get-File($Uri, $OutFile) {
            for ($i = 1; $i -le 5; $i++) {
              try { Invoke-WebRequest -Uri $Uri -OutFile $OutFile -UseBasicParsing; return }
              catch {
                Write-Host "Download failed: $Uri (attempt $i/5): $($_.Exception.Message)"
                if ($i -eq 5) { throw }
                Start-Sleep -Seconds 10
              }
            }
          }

          # Download Xray for Windows
          $Xray_URL = "https://github.com/XTLS/Xray-core/releases/download/v26.6.1/"
          Get-File "${Xray_URL}Xray-windows-64.zip" "Xray-windows-64.zip"
          Expand-Archive -Path "Xray-windows-64.zip" -DestinationPath .
          Remove-Item "Xray-windows-64.zip"
          Remove-Item geoip.dat, geosite.dat -ErrorAction SilentlyContinue
          Get-File "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" "geoip.dat"
          Get-File "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" "geosite.dat"
          Get-File "https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geoip.dat" "geoip_IR.dat"
          Get-File "https://github.com/chocolate4u/Iran-v2ray-rules/releases/latest/download/geosite.dat" "geosite_IR.dat"
          Get-File "https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geoip.dat" "geoip_RU.dat"
          Get-File "https://github.com/runetfreedom/russia-v2ray-rules-dat/releases/latest/download/geosite.dat" "geosite_RU.dat"
          Rename-Item xray.exe xray-windows-amd64.exe

          # Download mtg (MTProto sidecar) for Windows
          $MTG_VER = "2.2.8"
          Get-File "https://github.com/9seconds/mtg/releases/download/v$MTG_VER/mtg-$MTG_VER-windows-amd64.zip" "mtg-windows-amd64.zip"
          Expand-Archive -Path "mtg-windows-amd64.zip" -DestinationPath "mtg-tmp"
          $mtgExe = Get-ChildItem -Path "mtg-tmp" -Recurse -Filter "mtg.exe" | Select-Object -First 1
          Move-Item $mtgExe.FullName "mtg-windows-amd64.exe"
          Remove-Item "mtg-windows-amd64.zip", "mtg-tmp" -Recurse -Force

          cd ..
          Copy-Item -Path ..\windows_files\* -Destination . -Recurse
          cd ..

      - name: Package to Zip
        shell: pwsh
        run: |
          Compress-Archive -Path .\q-ui -DestinationPath "q-ui-windows-amd64.zip"

      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: q-ui-windows-amd64
          path: ./q-ui-windows-amd64.zip

      - name: Upload files to GH release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          file: q-ui-windows-amd64.zip
          asset_name: q-ui-windows-amd64.zip
          overwrite: true
          prerelease: false
